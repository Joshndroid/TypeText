name: Build release apps

on:
  push:
    tags:
      - "v*.*.*"

env:
  TYPETEXT_VERSION: ${{ github.ref_name }}

jobs:
  macos:
    name: macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build portable and installable apps
        run: |
          Scripts/build-macos-dmg.sh

      - name: Upload macOS app
        uses: actions/upload-artifact@v6
        with:
          name: TypeText-macOS
          path: |
            dist/TypeText-macOS.zip
            dist/TypeText-macOS.dmg
          if-no-files-found: error

  windows:
    name: Windows app
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build portable and installable apps
        shell: pwsh
        run: Scripts\build-windows-installer.ps1

      - name: Upload Windows app
        uses: actions/upload-artifact@v6
        with:
          name: TypeText-Windows-x64
          path: |
            dist/TypeText-Windows-x64.zip
            dist/TypeText-Windows-x64-Setup.exe
          if-no-files-found: error

  linux:
    name: Linux app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build portable and installable apps
        run: |
          bash Scripts/build-linux-deb.sh

      - name: Upload Linux app
        uses: actions/upload-artifact@v6
        with:
          name: TypeText-Linux-x64
          path: |
            dist/TypeText-Linux-*.tar.gz
            dist/typetext_*_amd64.deb
          if-no-files-found: error

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
      - linux
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Validate version tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use v.X.X.X format, for example v1.2.3." >&2
            exit 1
          fi

      - name: Download portable artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: TypeText ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            release-assets/TypeText-macOS.zip
            release-assets/TypeText-macOS.dmg
            release-assets/TypeText-Windows-x64.zip
            release-assets/TypeText-Windows-x64-Setup.exe
            release-assets/TypeText-Linux-*.tar.gz
            release-assets/typetext_*_amd64.deb
