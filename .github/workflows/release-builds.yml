name: Build release apps

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Intended release tag (vX.Y.Z); must match Cargo.toml
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    steps:
      - name: Validate version tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use v.X.X.X format, for example v1.2.3." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify release version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          expected_version="${RELEASE_TAG#v}"
          cargo_version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          if [[ "$cargo_version" != "$expected_version" ]]; then
            echo "Release tag must match the workspace version in Cargo.toml." >&2
            echo "tag=$RELEASE_TAG Cargo.toml=$cargo_version" >&2
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit --target-os windows --target-os macos

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  macos:
    name: macOS app
    runs-on: macos-latest
    needs: verify
    environment: release-signing
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.0
          components: clippy
          targets: aarch64-apple-darwin

      - name: Run macOS Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE_P12_BASE64" || -z "$MACOS_CERTIFICATE_PASSWORD" || -z "$MACOS_KEYCHAIN_PASSWORD" ]]; then
            echo "Missing macOS signing secrets." >&2
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -A -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Verify Developer ID signing
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          if [[ "$CODESIGN_IDENTITY" != Developer\ ID\ Application:* ]]; then
            echo "MACOS_CODESIGN_IDENTITY must be a Developer ID Application identity." >&2
            exit 1
          fi

          curl \
            --silent \
            --show-error \
            --max-time 30 \
            --output /dev/null \
            --write-out "Apple timestamp probe: HTTP %{http_code} in %{time_total}s\n" \
            http://timestamp.apple.com/ts01 || true

          cat >"$RUNNER_TEMP/signing-probe.c" <<'EOF'
          int main(void) { return 0; }
          EOF
          clang "$RUNNER_TEMP/signing-probe.c" -o "$RUNNER_TEMP/signing-probe"

          perl -e 'alarm shift @ARGV; exec @ARGV or die "exec failed: $!\n"' \
            180 \
            codesign \
            --force \
            --options runtime \
            --timestamp \
            --verbose=4 \
            --sign "$CODESIGN_IDENTITY" \
            "$RUNNER_TEMP/signing-probe"
          codesign --verify --strict --verbose=4 "$RUNNER_TEMP/signing-probe"

      - name: Build portable and installable apps
        timeout-minutes: 120
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          CODESIGN_TIMEOUT_SECONDS: "2700"
          NOTARIZE: "1"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          Scripts/build-macos-dmg.sh

      - name: Verify macOS notarization
        run: |
          spctl --assess --type execute --verbose=4 dist/TypeText.app
          xcrun stapler validate dist/TypeText.app
          xcrun stapler validate dist/TypeText-macOS.dmg

      - name: Clean up signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/developer-id.p12"

      - name: Upload macOS app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: TypeText-macOS
          path: |
            dist/TypeText-macOS.zip
            dist/TypeText-macOS.dmg
          if-no-files-found: error

  windows-portable:
    name: Windows portable
    runs-on: windows-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.0
          components: clippy
          targets: x86_64-pc-windows-msvc

      - name: Run Windows Clippy
        shell: pwsh
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Build standard portable app
        shell: pwsh
        run: Scripts\build-windows-portable.ps1 -Variant Standard

      - name: Upload standard portable app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: TypeText-Windows-x64-portable
          path: dist/TypeText-Windows-x64.zip
          if-no-files-found: error

  windows-offline-portable:
    name: Windows offline portable
    runs-on: windows-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.0
          targets: x86_64-pc-windows-msvc

      - name: Test offline feature configuration
        shell: pwsh
        run: cargo test --workspace --all-targets --no-default-features --features offline-portable --locked

      - name: Build offline portable app
        shell: pwsh
        run: Scripts\build-windows-portable.ps1 -Variant Offline

      - name: Upload offline portable app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: TypeText-Windows-x64-offline-portable
          path: dist/TypeText-Windows-x64-Offline-Portable.zip
          if-no-files-found: error

  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.0
          targets: x86_64-pc-windows-msvc

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: Scripts\build-windows-installer.ps1

      - name: Upload installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: TypeText-Windows-x64-installer
          path: dist/TypeText-Windows-x64-Setup.exe
          if-no-files-found: error

  windows-defender-scan:
    name: Scan Windows release artifacts
    runs-on: windows-latest
    needs:
      - windows-portable
      - windows-offline-portable
      - windows-installer
    timeout-minutes: 15
    steps:
      - name: Download Windows release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: TypeText-Windows-x64-*
          path: defender-input
          merge-multiple: true

      - name: Verify Microsoft Defender and update signatures
        shell: pwsh
        run: |
          $status = Get-MpComputerStatus -ErrorAction Stop

          $status | Select-Object `
            AMRunningMode, `
            AMServiceEnabled, `
            AntivirusEnabled, `
            RealTimeProtectionEnabled, `
            AMEngineVersion, `
            AntivirusSignatureVersion, `
            AntivirusSignatureLastUpdated | Format-List

          if (-not $status.AMServiceEnabled) {
            throw "Microsoft Defender's antimalware service is not enabled."
          }

          if (-not $status.AntivirusEnabled) {
            throw "Microsoft Defender Antivirus is not enabled."
          }

          if ($status.AMRunningMode -ne "Normal") {
            throw "Microsoft Defender is not active (mode: $($status.AMRunningMode))."
          }

          $existingDetections = @(Get-MpThreatDetection -ErrorAction Stop)
          if ($existingDetections.Count -gt 0) {
            $existingDetections | Format-List
            throw "The fresh runner already reports a Defender detection."
          }

          Update-MpSignature -ErrorAction Stop

      - name: Prepare Windows artifacts for scanning
        shell: pwsh
        run: |
          $inputRoot = Join-Path $PWD "defender-input"
          $scanRoot = Join-Path $PWD "defender-scan"
          $expandedRoot = Join-Path $scanRoot "expanded"
          New-Item -ItemType Directory -Path $expandedRoot -Force | Out-Null

          $artifacts = @(
            "TypeText-Windows-x64.zip",
            "TypeText-Windows-x64-Offline-Portable.zip",
            "TypeText-Windows-x64-Setup.exe"
          )

          foreach ($artifact in $artifacts) {
            $source = Join-Path $inputRoot $artifact
            if (-not (Test-Path $source)) {
              throw "Expected release artifact was not downloaded: $artifact"
            }
            Copy-Item $source $scanRoot
          }

          Expand-Archive `
            -Path (Join-Path $inputRoot "TypeText-Windows-x64.zip") `
            -DestinationPath (Join-Path $expandedRoot "standard-portable") `
            -Force
          Expand-Archive `
            -Path (Join-Path $inputRoot "TypeText-Windows-x64-Offline-Portable.zip") `
            -DestinationPath (Join-Path $expandedRoot "offline-portable") `
            -Force

      - name: Scan Windows release artifacts with Microsoft Defender
        shell: pwsh
        run: |
          $scanRoot = Join-Path $PWD "defender-scan"
          Start-MpScan `
            -ScanType CustomScan `
            -ScanPath $scanRoot `
            -ErrorAction Stop

          $detections = @(Get-MpThreatDetection -ErrorAction Stop)
          if ($detections.Count -gt 0) {
            $detections | Format-List
            throw "Microsoft Defender reported a detection in the Windows release artifacts."
          }

          $status = Get-MpComputerStatus -ErrorAction Stop
          $reportPath = Join-Path $PWD "defender-scan-report.txt"
          @(
            "Microsoft Defender release scan: no detections",
            "Scan time (UTC): $([DateTime]::UtcNow.ToString('O'))",
            "Engine version: $($status.AMEngineVersion)",
            "Signature version: $($status.AntivirusSignatureVersion)",
            "Signatures updated: $($status.AntivirusSignatureLastUpdated)",
            "",
            "SHA-256 release artifact hashes:"
          ) | Set-Content -Path $reportPath -Encoding UTF8

          $releaseArtifacts = @(
            "defender-input\TypeText-Windows-x64.zip",
            "defender-input\TypeText-Windows-x64-Offline-Portable.zip",
            "defender-input\TypeText-Windows-x64-Setup.exe"
          )
          Get-FileHash -Algorithm SHA256 -Path $releaseArtifacts |
            ForEach-Object { "$($_.Hash)  $([IO.Path]::GetFileName($_.Path))" } |
            Add-Content -Path $reportPath -Encoding UTF8

          Get-Content $reportPath

      - name: Upload Microsoft Defender scan report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: TypeText-Windows-Defender-scan-report
          path: defender-scan-report.txt
          if-no-files-found: error

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows-portable
      - windows-offline-portable
      - windows-installer
      - windows-defender-scan
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout release history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate version tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use v.X.X.X format, for example v1.2.3." >&2
            exit 1
          fi

      - name: Generate release notes
        run: |
          Scripts/generate-release-notes.sh release-notes.md "$GITHUB_REF_NAME"

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            release-assets/TypeText-macOS.zip
            release-assets/TypeText-macOS.dmg
            release-assets/TypeText-Windows-x64.zip
            release-assets/TypeText-Windows-x64-Offline-Portable.zip
            release-assets/TypeText-Windows-x64-Setup.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: TypeText ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            release-assets/TypeText-macOS.zip
            release-assets/TypeText-macOS.dmg
            release-assets/TypeText-Windows-x64.zip
            release-assets/TypeText-Windows-x64-Offline-Portable.zip
            release-assets/TypeText-Windows-x64-Setup.exe

  dry-run-summary:
    name: Verify dry-run release bundle
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows-portable
      - windows-offline-portable
      - windows-installer
      - windows-defender-scan
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout release history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download dry-run artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify release bundle and preview notes
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          expected_assets=(
            TypeText-macOS.zip
            TypeText-macOS.dmg
            TypeText-Windows-x64.zip
            TypeText-Windows-x64-Offline-Portable.zip
            TypeText-Windows-x64-Setup.exe
            defender-scan-report.txt
          )

          for asset in "${expected_assets[@]}"; do
            if [[ ! -f "release-assets/$asset" ]]; then
              echo "Dry run did not produce expected artifact: $asset" >&2
              exit 1
            fi
          done

          git tag "$RELEASE_TAG" HEAD
          Scripts/generate-release-notes.sh release-notes-preview.md "$RELEASE_TAG"
          sha256sum "${expected_assets[@]/#/release-assets/}" > release-assets.sha256

      - name: Upload dry-run summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: TypeText-release-dry-run-summary
          path: |
            release-notes-preview.md
            release-assets.sha256
          if-no-files-found: error
