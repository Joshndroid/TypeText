name: Windows release and Defender dry run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-release-dry-run:
    name: Build and scan Windows release artifacts
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.0
          targets: x86_64-pc-windows-msvc

      - name: Verify Microsoft Defender and update signatures
        shell: pwsh
        run: |
          # Defender is not always fully enabled on hosted runner images, so
          # try to start the services it needs BEFORE checking its state.
          foreach ($serviceName in @("WinDefend", "BITS", "wuauserv")) {
            $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
            if ($null -eq $service) {
              Write-Warning "Service $serviceName not found on this runner."
              continue
            }
            if ($service.Status -ne "Running") {
              Write-Host "Starting service $serviceName (currently $($service.Status))..."
              try {
                Start-Service -Name $serviceName -ErrorAction Stop
                $service.WaitForStatus("Running", [TimeSpan]::FromSeconds(60))
                Write-Host "Service $serviceName is running."
              } catch {
                Write-Warning "Could not start ${serviceName}: $_"
              }
            } else {
              Write-Host "Service $serviceName is running."
            }
          }

          # Give the antimalware engine a moment to settle after a cold start,
          # then verify Defender is actually usable on this runner.
          $status = $null
          foreach ($attempt in 1..6) {
            $status = Get-MpComputerStatus -ErrorAction SilentlyContinue
            if ($status -and $status.AMServiceEnabled -and $status.AntivirusEnabled -and $status.AMRunningMode -eq "Normal") {
              break
            }
            Write-Host "Defender not ready yet (attempt $attempt of 6); waiting 10 seconds..."
            Start-Sleep -Seconds 10
          }

          if (-not $status) {
            throw "Get-MpComputerStatus returned nothing; Defender is unavailable on this runner."
          }

          $status | Select-Object `
            AMRunningMode, `
            AMServiceEnabled, `
            AntivirusEnabled, `
            RealTimeProtectionEnabled, `
            AMEngineVersion, `
            AntivirusSignatureVersion, `
            AntivirusSignatureLastUpdated | Format-List

          if (-not $status.AMServiceEnabled) {
            throw "Microsoft Defender's antimalware service is not enabled."
          }

          if (-not $status.AntivirusEnabled) {
            throw "Microsoft Defender Antivirus is not enabled."
          }

          if ($status.AMRunningMode -ne "Normal") {
            throw "Microsoft Defender is not active (mode: $($status.AMRunningMode))."
          }

          $existingDetections = @(Get-MpThreatDetection -ErrorAction SilentlyContinue)
          if ($existingDetections.Count -gt 0) {
            $existingDetections | Format-List
            throw "The fresh runner already reports a Defender detection."
          }

          # Update-MpSignature is flaky on hosted runners (intermittent RPC
          # failures); retry with backoff and fail with diagnostics if it
          # never succeeds.
          $maxAttempts = 5
          $delaySeconds = 10
          $updated = $false
          foreach ($attempt in 1..$maxAttempts) {
            try {
              Update-MpSignature -ErrorAction Stop
              $updated = $true
              break
            } catch {
              Write-Warning "Update-MpSignature attempt $attempt of $maxAttempts failed: $_"
              if ($attempt -lt $maxAttempts) {
                Write-Host "Retrying in $delaySeconds seconds..."
                Start-Sleep -Seconds $delaySeconds
                $delaySeconds *= 2
              }
            }
          }

          if (-not $updated) {
            Write-Host "::group::Defender diagnostics"
            Write-Host "--- Get-MpComputerStatus ---"
            Get-MpComputerStatus | Format-List | Out-String | Write-Host
            Write-Host "--- Service states ---"
            Get-Service -Name WinDefend, WdNisSvc, BITS, wuauserv -ErrorAction SilentlyContinue |
              Format-Table Name, Status, StartType -AutoSize | Out-String | Write-Host
            Write-Host "--- Recent Defender operational events ---"
            Get-WinEvent -LogName "Microsoft-Windows-Windows Defender/Operational" -MaxEvents 30 -ErrorAction SilentlyContinue |
              Format-Table TimeCreated, Id, LevelDisplayName, Message -Wrap | Out-String | Write-Host
            Write-Host "--- Recent System log errors ---"
            Get-WinEvent -FilterHashtable @{ LogName = "System"; Level = 1, 2, 3; StartTime = (Get-Date).AddHours(-1) } -MaxEvents 30 -ErrorAction SilentlyContinue |
              Format-Table TimeCreated, ProviderName, Id, LevelDisplayName, Message -Wrap | Out-String | Write-Host
            Write-Host "::endgroup::"
            throw "Update-MpSignature failed after $maxAttempts attempts; see diagnostics above."
          }

          $status = Get-MpComputerStatus -ErrorAction Stop
          Write-Host "Signatures updated to $($status.AntivirusSignatureVersion) ($($status.AntivirusSignatureLastUpdated))."

      - name: Test offline feature configuration
        shell: pwsh
        run: cargo test --workspace --all-targets --no-default-features --features offline-portable --locked

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build standard portable app and installer
        shell: pwsh
        run: Scripts\build-windows-installer.ps1

      - name: Build offline portable app
        shell: pwsh
        run: Scripts\build-windows-portable.ps1 -Variant Offline

      - name: Prepare release artifacts for scanning
        shell: pwsh
        run: |
          $scanRoot = Join-Path $PWD "defender-scan"
          $expandedRoot = Join-Path $scanRoot "expanded"
          New-Item -ItemType Directory -Path $expandedRoot -Force | Out-Null

          $artifacts = @(
            "dist\TypeText-Windows-x64.zip",
            "dist\TypeText-Windows-x64-Offline-Portable.zip",
            "dist\TypeText-Windows-x64-Setup.exe"
          )

          foreach ($artifact in $artifacts) {
            if (-not (Test-Path $artifact)) {
              throw "Expected release artifact was not built: $artifact"
            }
            Copy-Item $artifact $scanRoot
          }

          Expand-Archive `
            -Path "dist\TypeText-Windows-x64.zip" `
            -DestinationPath (Join-Path $expandedRoot "standard-portable") `
            -Force
          Expand-Archive `
            -Path "dist\TypeText-Windows-x64-Offline-Portable.zip" `
            -DestinationPath (Join-Path $expandedRoot "offline-portable") `
            -Force

      - name: Scan Windows release artifacts with Microsoft Defender
        shell: pwsh
        run: |
          $scanRoot = Join-Path $PWD "defender-scan"
          Start-MpScan `
            -ScanType CustomScan `
            -ScanPath $scanRoot `
            -ErrorAction Stop

          $detections = @(Get-MpThreatDetection -ErrorAction Stop)
          if ($detections.Count -gt 0) {
            $detections | Format-List
            throw "Microsoft Defender reported a detection in the Windows release artifacts."
          }

          $status = Get-MpComputerStatus -ErrorAction Stop
          $reportPath = Join-Path $PWD "dist\defender-scan-report.txt"
          @(
            "Microsoft Defender release dry run: no detections",
            "Scan time (UTC): $([DateTime]::UtcNow.ToString('O'))",
            "Engine version: $($status.AMEngineVersion)",
            "Signature version: $($status.AntivirusSignatureVersion)",
            "Signatures updated: $($status.AntivirusSignatureLastUpdated)",
            "",
            "SHA-256 release artifact hashes:"
          ) | Set-Content -Path $reportPath -Encoding UTF8

          $releaseArtifacts = @(
            "dist\TypeText-Windows-x64.zip",
            "dist\TypeText-Windows-x64-Offline-Portable.zip",
            "dist\TypeText-Windows-x64-Setup.exe"
          )
          Get-FileHash -Algorithm SHA256 -Path $releaseArtifacts |
            ForEach-Object { "$($_.Hash)  $([IO.Path]::GetFileName($_.Path))" } |
            Add-Content -Path $reportPath -Encoding UTF8

          Get-Content $reportPath

      - name: Upload scanned dry-run artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: TypeText-Windows-Defender-dry-run
          path: |
            dist/TypeText-Windows-x64.zip
            dist/TypeText-Windows-x64-Offline-Portable.zip
            dist/TypeText-Windows-x64-Setup.exe
            dist/defender-scan-report.txt
          if-no-files-found: error
